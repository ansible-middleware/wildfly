---
- name: "Ensure required parameters are provided."
  ansible.builtin.assert:
    that:
      - target_wildfly_home is defined
      - previous_wildfly_home is defined
    quiet: True
    fail_msg: "Missing required parameters."

# On RHEL 8, dnf's Python bindings are tied to platform-python so added in vars ansible_python_interpreter=/usr/bin/python3.9 cannot load python3-dnf there.
- name: "Ensure that the required JVM has been installed on target: {{ wildfly_migration_jdk_package_name }}"
  become: "{{ wildfly_migration_jdk_package_install_requires_privileges_escalation | default('yes') }}"
  become_user: "{{ wildfly_migration_jdk_package_install_requires_privileges_escalation_user | default('root') }}"
  ansible.builtin.dnf:
    name: "{{ wildfly_migration_jdk_package_name }}"
    state: present
  vars:
    ansible_python_interpreter: >-
      {{ '/usr/libexec/platform-python'
         if ansible_os_family == 'RedHat' and ansible_distribution_major_version | default('0') | int == 8
         else (hostvars[inventory_hostname]['ansible_python_interpreter'] | default(ansible_playbook_python)) }}
  when:
    - not wildfly_migration_jdk_package_skip_install

- name: "Ensure Server Migration Tool is installed on target if EAP8+ is the target"
  ansible.builtin.include_tasks: install/rhn.yml
  when:
    - eap_enable is defined and eap_enable
    - eap_version is defined and eap_version is version('8.0.0', '>=')

- name: "Ensure Server Migration Tool is installed from web if WildFly is the target"
  ansible.builtin.include_tasks: install/web.yml
  when:
    - not eap_enable is defined or not eap_enable

- name: "Escalate privileges if required"
  become: "{{ wildfly_migration_require_privileges_escalation }}"
  block:

    - name: "Ensure that the Migration Toolkit configuration directory exists"
      ansible.builtin.file:
        path: "{{ wildfly_migration_path_to_env_properties | dirname }}"
        state: directory
        owner: "{{ wildfly_user | default(omit) }}"
        group: "{{ wildfly_group | default(omit) }}"
        mode: "0755"

    - name: "Ensure that the Migration Toolkit configuration have been updated to include: {{ wildfly_migration_config_files }}"
      ansible.builtin.template:
        src: "{{ wildfly_migration_tool_configuration_template }}"
        dest: "{{ wildfly_migration_path_to_env_properties }}"
        mode: "0644"

    - name: "Run migration tool"
      ansible.builtin.include_tasks: run_server_migration.yml
