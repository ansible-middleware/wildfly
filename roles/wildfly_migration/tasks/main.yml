---
- name: "Ensure required parameters are provided."
  ansible.builtin.assert:
    that:
      - target_wildfly_home is defined
      - previous_wildfly_home is defined
    quiet: True
    fail_msg: "Missing required parameters."

- name: Apply EAP 7.x migration tool layout (tool inside server installation directory)
  when:
    - eap_enable is defined and eap_enable
    - (eap_version | default('8.0.0')) is version('8.0.0', '<')
  ansible.builtin.set_fact:
    wildfly_migration_server_tool_home: "{{ target_wildfly_home }}"
    wildfly_migration_tool_bin_folder: "bin"
    wildfly_migration_server_tool_subfolder_to_configuration: "/migration"
    wildfly_migration_server_tool_path_to_script: "{{ target_wildfly_home }}/bin/{{ wildfly_migration_tool_bin_script_name }}"
    wildfly_migration_path_to_env_properties: "{{ target_wildfly_home }}/migration/{{ wildfly_migration_server_tool_env_properties_file }}"

# RHEL 8: dnf Python bindings are not available for python3.9; platform-python is 3.6 and
# cannot run ansible-core 2.18+ modules. Use the dnf CLI (same pattern as wildfly_install prereqs).
- name: "Ensure that the required JVM has been installed on target: {{ wildfly_migration_jdk_package_name }} (RHEL 8)"
  become: "{{ wildfly_migration_jdk_package_install_requires_privileges_escalation | default('yes') }}"
  become_user: "{{ wildfly_migration_jdk_package_install_requires_privileges_escalation_user | default('root') }}"
  ansible.builtin.command:
    cmd: "dnf install -y {{ wildfly_migration_jdk_package_name }}"
  register: wildfly_migration_dnf_install_jdk
  changed_when:
    - "'Installing:' in wildfly_migration_dnf_install_jdk.stdout or 'Upgrading:' in wildfly_migration_dnf_install_jdk.stdout"
  when:
    - not wildfly_migration_jdk_package_skip_install
    - ansible_os_family == 'RedHat'
    - ansible_distribution_major_version | default('0') | int == 8

- name: "Ensure that the required JVM has been installed on target: {{ wildfly_migration_jdk_package_name }}"
  become: "{{ wildfly_migration_jdk_package_install_requires_privileges_escalation | default('yes') }}"
  become_user: "{{ wildfly_migration_jdk_package_install_requires_privileges_escalation_user | default('root') }}"
  ansible.builtin.dnf:
    name: "{{ wildfly_migration_jdk_package_name }}"
    state: present
  when:
    - not wildfly_migration_jdk_package_skip_install
    - not (ansible_os_family == 'RedHat' and ansible_distribution_major_version | default('0') | int == 8)

- name: "Ensure Server Migration Tool is installed on target if EAP8+ is the target"
  ansible.builtin.include_tasks: install/rhn.yml
  when:
    - eap_enable is defined and eap_enable
    # Match EAP 7.x layout condition: use default so include_tasks runs when callers omit
    # eap_version (some playbooks only pass eap_enable + homes). Otherwise both RHN and
    # web installs skip and prerun_checks fails on missing jboss-server-migration.sh.
    - (eap_version | default('8.0.0')) is version('8.0.0', '>=')

- name: "Ensure Server Migration Tool is installed from web if WildFly is the target"
  ansible.builtin.include_tasks: install/web.yml
  when:
    - not eap_enable is defined or not eap_enable

- name: "Escalate privileges if required"
  become: "{{ wildfly_migration_require_privileges_escalation }}"
  block:

    - name: "Ensure that the Migration Toolkit configuration directory exists"
      ansible.builtin.file:
        path: "{{ wildfly_migration_path_to_env_properties | dirname }}"
        state: directory
        owner: "{{ wildfly_user | default(omit) }}"
        group: "{{ wildfly_group | default(omit) }}"
        mode: "0755"

    - name: "Ensure that the Migration Toolkit configuration have been updated to include: {{ wildfly_migration_config_files }}"
      ansible.builtin.template:
        src: "{{ wildfly_migration_tool_configuration_template }}"
        dest: "{{ wildfly_migration_path_to_env_properties }}"
        mode: "0644"

    - name: "Run migration tool"
      ansible.builtin.include_tasks: run_server_migration.yml
